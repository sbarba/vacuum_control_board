<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
body { padding: 1rem; background: #fff; }
#pick { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 20vh; gap: 1rem; text-align: center; padding: 1.5rem 0; }
#pick h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
#pick p { font-size: 14px; color: #666; margin-bottom: 1rem; }
.pick-btn { font-size: 15px; padding: 10px 28px; border: 1.5px solid #185FA5; border-radius: 8px; color: #185FA5; background: #fff; cursor: pointer; min-width: 220px; }
.pick-btn:hover { background: #E6F1FB; }
.pick-btn-west { border-color: #B87820; color: #7a5010; background: #FAE8C8; }
.pick-btn-west:hover { background: #f5d8a0; }
.pick-btn-east { border-color: #2E7D5A; color: #1a5c3e; background: #D4EDE1; }
.pick-btn-east:hover { background: #b8dece; }
#done { display: none; text-align: center; padding: 2rem; }
#done h2 { font-size: 22px; font-weight: 500; margin-bottom: 0.5rem; }
#done .pick-btn { margin: 0 auto; }
path.country { fill: #d0d0d0; stroke: #aaa; stroke-width: 0.8px; fill-rule: evenodd; }
path.atlantic { fill: #E6F1FB; stroke: #185FA5; stroke-width: 1.2px; cursor: pointer; transition: fill 0.1s; fill-rule: evenodd; }
path.atlantic:hover { fill: #B5D4F4; }
path.preview-west { fill: #FAE8C8; stroke: #B87820; stroke-width: 1px; fill-rule: evenodd; }
path.preview-east { fill: #D4EDE1; stroke: #2E7D5A; stroke-width: 1px; fill-rule: evenodd; }
path.win { fill: #C0DD97 !important; stroke: #3B6D11 !important; }
path.lose { fill: #F7C1C1 !important; stroke: #A32D2D !important; }
path.show { fill: #FAC775 !important; stroke: #854F0B !important; }
.lbl { font-size: 11px; font-weight: 600; fill: #185FA5; text-anchor: middle; font-family: sans-serif; }
.lbl-left { font-size: 11px; font-weight: 600; fill: #185FA5; text-anchor: end; font-family: sans-serif; }
.lbl-right { font-size: 11px; font-weight: 600; fill: #185FA5; text-anchor: start; font-family: sans-serif; }
.lbl-line { stroke: #185FA5; stroke-width: 0.6; opacity: 0.5; }
.lbl-missed, [data-country].missed { fill: #A32D2D !important; }
line[data-country].missed { stroke: #A32D2D !important; opacity: 0.6; }
/* UI panel inside SVG */
.ui-panel { font-family: sans-serif; }
.ui-panel .score { font-size: 13px; color: #555; margin-bottom: 6px; }
.ui-panel .qbox { background: #f5f5f5; border-radius: 8px; padding: 8px 10px; font-size: 13px; font-weight: 500; }
.ui-panel .fb { font-size: 11px; padding: 3px 8px; border-radius: 5px; margin-top: 6px; display: none; }
.ui-panel .fb.ok { background: #eaf3de; color: #3B6D11; display: block; }
.ui-panel .fb.no { background: #fcebeb; color: #A32D2D; display: block; }
</style>
</head>
<body>

<div id="pick">
  <h1>Africa Geography Quiz</h1>
  <p>Choose a region to study:</p>
  <button class="pick-btn pick-btn-west" onclick="startQuiz('west')">West Africa</button>
  <button class="pick-btn pick-btn-east" onclick="startQuiz('east')">East Africa</button>
</div>

    <button class="pick-btn pick-btn-west" onclick="startQuiz('west')">West Africa</button>
    <button class="pick-btn pick-btn-east" onclick="startQuiz('east')">East Africa</button>
  </div>
</div>

<script>
const westNames = ["Mauritania","Senegal","The Gambia","Guinea-Bissau","Guinea","Sierra Leone","Liberia","Ivory Coast","Ghana","Togo","Benin","Burkina Faso","Cameroon","Eq. Guinea","Gabon","Republic of the Congo","Central African Rep.","Mali","Niger","Chad","Nigeria"];
const eastNames = ["Eritrea","Djibouti","Ethiopia","S. Sudan","Somalia","Kenya","Uganda","Rwanda","Burundi","Tanzania","Zambia","Malawi","Mozambique","Zimbabwe","Botswana","Lesotho","Swaziland","South Africa"];

// Map data-name -> display name and vice versa for east
const eastDisplay  = {"S. Sudan":"South Sudan","Swaziland":"Eswatini"};
const eastDataName = {};
eastNames.forEach(n => { eastDataName[eastDisplay[n]||n] = n; });

let names=[], q=[], cur=null, score=0, total=0, answered=false, mode=null, missed=new Set();

function initPreview() {
  westNames.forEach(n => {
    const el = document.querySelector('[data-name="'+n+'"]');
    if(el) el.classList.add('preview-west');
  });
  eastNames.forEach(n => {
    const display = eastDisplay[n]||n;
    const el = document.querySelector('[data-name="'+n+'"]');
    if(el) el.classList.add('preview-east');
  });
}
initPreview();

// Helpers: get the right panel elements
function elSc()    { return document.getElementById(mode==='west'?'sc':'sc-e'); }
function elTgt()   { return document.getElementById(mode==='west'?'tgt':'tgt-e'); }
function elFb()    { return document.getElementById(mode==='west'?'fb':'fb-e'); }
function elTotLbl(){ return document.getElementById(mode==='west'?'total-lbl':'total-lbl-e'); }
function uiPanel() { return document.getElementById(mode==='west'?'ui-west':'ui-east'); }

function startQuiz(m) {
  mode = m;
  names = m==='west' ? westNames : eastNames.map(n => eastDisplay[n]||n);

  document.getElementById('pick').style.display='none';
  document.getElementById('done').style.display='none';
  document.getElementById('ui-west').style.display='none';
  document.getElementById('ui-east').style.display='none';
  document.getElementById('labels').style.display='none';
  document.getElementById('labels-se').style.display='none';
  document.querySelectorAll('[data-country]').forEach(el => el.classList.remove('missed'));
  document.querySelectorAll('path').forEach(p=>p.classList.remove('atlantic','win','lose','show','preview-west','preview-east'));

  names.forEach(displayName => {
    const dataName = mode==='east' ? eastDataName[displayName] : displayName;
    const el = document.querySelector('[data-name="'+dataName+'"]');
    if(el) el.classList.add('atlantic');
  });

  uiPanel().style.display='block';
  elTotLbl().textContent = names.length;
  q=[...names].sort(()=>Math.random()-0.5);
  score=0; total=0; answered=false; cur=null; missed=new Set();
  upd(); nextQ();
}

function nextQ() {
  document.querySelectorAll('path').forEach(p=>p.classList.remove('win','lose','show'));
  const fb=elFb(); fb.className='fb'; fb.style.display='none';
  answered=false;
  if(!q.length) {
    uiPanel().style.display='none';
    document.getElementById('done').style.display='block';
    document.getElementById('fin').textContent=score+' / '+total;
    const labelsEl = mode==='west' ? document.getElementById('labels') : document.getElementById('labels-se');
    labelsEl.style.display='block';
    // Colour missed countries and their labels red
    missed.forEach(displayName => {
      const dataName = mode==='east' ? eastDataName[displayName] : displayName;
      const path = document.querySelector('[data-name="'+dataName+'"]');
      if(path) { path.classList.remove('win','show'); path.classList.add('lose'); }
      labelsEl.querySelectorAll('[data-country="'+displayName+'"]').forEach(el => el.classList.add('missed'));
    });
    if(score===total) launchConfetti();
    return;
  }
  cur=q.shift(); elTgt().textContent=cur;
}

function upd() { elSc().textContent=score+' / '+total; }

document.getElementById('asvg').addEventListener('click', e => {
  const p = e.target.closest('path.atlantic'); if(!p) return;
  const dataName = p.dataset.name;
  const clicked = mode==='east' ? (eastDisplay[dataName]||dataName) : dataName;
  const fb=elFb();
  if(!answered) {
    answered=true; total++;
    if(clicked===cur) {
      score++; p.classList.add('win');
      fb.textContent='Correct! Click it again to continue.'; fb.className='fb ok'; fb.style.display='block';
    } else {
      p.classList.add('lose');
      const curDataName = mode==='east' ? eastDataName[cur] : cur;
      document.querySelector('[data-name="'+curDataName+'"]')?.classList.add('show');
      fb.textContent='Wrong — that\'s '+clicked+'. Click '+cur+' to continue.'; fb.className='fb no'; fb.style.display='block';
      missed.add(cur);
    }
    upd();
  } else {
    const curDataName = mode==='east' ? eastDataName[cur] : cur;
    if(dataName===curDataName) nextQ();
  }
});

function launchConfetti() {
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  canvas.style.display = 'block';
  const ctx = canvas.getContext('2d');
  const pieces = Array.from({length:160}, () => ({
    x: Math.random()*canvas.width, y: Math.random()*-canvas.height,
    r: Math.random()*6+4, d: Math.random()*160,
    color: ['#C0DD97','#E6F1FB','#FAC775','#F7C1C1','#185FA5','#3B6D11','#854F0B'][Math.floor(Math.random()*7)],
    tilt: Math.random()*10-10, tiltAngle:0, tiltSpeed:Math.random()*0.1+0.05
  }));
  let frame;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p => {
      ctx.beginPath(); ctx.lineWidth=p.r; ctx.strokeStyle=p.color;
      ctx.moveTo(p.x+p.tilt+p.r/4,p.y); ctx.lineTo(p.x+p.tilt,p.y+p.tilt+p.r/4); ctx.stroke();
      p.tiltAngle+=p.tiltSpeed; p.y+=(Math.cos(p.d)+2+p.r/2)*0.8; p.x+=Math.sin(p.d)*1.2;
      p.tilt=Math.sin(p.tiltAngle)*12;
      if(p.y>canvas.height){p.y=-10;p.x=Math.random()*canvas.width;}
    });
    frame=requestAnimationFrame(draw);
  }
  draw();
  setTimeout(()=>{cancelAnimationFrame(frame);ctx.clearRect(0,0,canvas.width,canvas.height);canvas.style.display='none';},4000);
}
</script>
<canvas id="confetti-canvas" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999"></canvas>
